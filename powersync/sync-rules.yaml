# See https://docs.powersync.com/sync/advanced/compatibility
config:
  edition: 3

streams:
  by_user:
    # Each user gets their profile + all data for their household(s)
    auto_subscribe: true
    queries:
      # User's own profile
      - SELECT * FROM profiles WHERE id = auth.user_id()

      # Household membership (determines what else syncs)
      - SELECT * FROM household_members WHERE user_id = auth.user_id()

      # Households the user belongs to
      - SELECT h.* FROM households h
        WHERE h.id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())

      # Profiles of fellow household members
      - SELECT p.* FROM profiles p
        WHERE p.id IN (SELECT user_id FROM household_members WHERE household_id IN
          (SELECT household_id FROM household_members WHERE user_id = auth.user_id()))

      # Invites for user's households
      - SELECT * FROM household_invites
        WHERE household_id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())

      # Categories (shared per household)
      - SELECT * FROM categories
        WHERE household_id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())

      # Budgets (all household members can see each other's budgets)
      - SELECT * FROM budgets
        WHERE household_id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())

      # Envelope allocations (via budgets)
      - SELECT ea.* FROM envelope_allocations ea
        WHERE ea.budget_id IN (SELECT id FROM budgets WHERE household_id IN
          (SELECT household_id FROM household_members WHERE user_id = auth.user_id()))

      # Accounts
      - SELECT * FROM accounts
        WHERE household_id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())

      # Transactions
      - SELECT * FROM transactions
        WHERE household_id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())

      # Recurring transactions
      - SELECT * FROM recurring_transactions
        WHERE household_id IN (SELECT household_id FROM household_members WHERE user_id = auth.user_id())
